name: Auto Release

on:
  push:
    branches:
      - main
      - test/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run semantic-release"
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          dry_run: ${{ github.event.inputs.dry_run || startsWith(github.ref, 'refs/heads/test/') }}
