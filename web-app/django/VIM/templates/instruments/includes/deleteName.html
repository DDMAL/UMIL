{% load static %}

<!-- Confirmation Modal Structure -->
<div class="modal fade"
     id="deleteNameModal"
     tabindex="-1"
     aria-labelledby="deleteNameModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable modal-fullscreen-md-down">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteNameModalLabel">
          Delete Name for <span id="instrumentNameInModalHeader"></span>
        </h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <p>
            The following will be deleted from the UMIL database. The entry will persist on Wikidata.
          </p>
        </div>
        <div class="mb-3 p-2 border rounded bg-light">
          <div class="row">
            <div class="col-md-3">
              <label class="form-label fw-bold">Language:</label>
            </div>
            <div class="col-md-9">
              <span id="instrumentLanguageInModal" class="form-control-plaintext"></span>
            </div>
          </div>
          <div class="row">
            <div class="col-md-3">
              <label class="form-label fw-bold">Name:</label>
            </div>
            <div class="col-md-9">
              <span id="instrumentNameInModal" class="form-control-plaintext"></span>
            </div>
          </div>
          <div class="row">
            <div class="col-md-3">
              <label class="form-label fw-bold">Source:</label>
            </div>
            <div class="col-md-9">
              <span id="instrumentSourceInModal" class="form-control-plaintext"></span>
            </div>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col text-end">
            <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="button" class="btn btn-danger modal-btn" id="confirmDeleteBtn">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
