{% load static %}

<!-- Modal Structure -->
<div class="modal fade"
     id="addNameModal"
     tabindex="-1"
     aria-labelledby="addNameModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable modal-fullscreen-md-down">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addNameModalLabel">
          <span>Add New Name: <span id="instrumentNameInModal" class="notranslate m-1"></span></span>
          <br />
          <small>UMIL ID: <span id="instrumentUmilIdInModal" class="notranslate m-1"></span></small>
          <br />
          <small>Wikidata ID: <span id="instrumentWikidataIdInModal" class="notranslate m-1 text-muted"></span></small>
        </h5>
        <div class="flex-grow-1"></div>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addNameForm" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          <div class="mb-3" id="nameRows">
            <!-- Placeholder for dynamically generated rows -->
          </div>
          <!-- Row for 'Add a new row' button -->
          <div class="row">
            <div class="col">
              <button type="button" class="btn btn-secondary" id="addRowBtn">
                Add another row
              </button>
              <div class="mt-3 pt-3 border-top">
                <small>
                  <a href="https://github.com/DDMAL/UMIL/wiki/Adding-a-New-Instrument-Name" 
                     target="_blank" 
                     style="color: #606c38; text-decoration: underline; font-weight: 500;">
                     📖 Guideline: Adding a New Instrument Name
                  </a>
                </small>
              </div>
            </div>
          </div>
          <!-- Row for 'Publish' button -->
          <div class="row mt-3">
            <div class="col text-end">
              <button type="submit" class="btn btn-primary modal-btn">Publish</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<!-- Confirmation Modal Structure -->
<div class="modal fade"
     id="confirmationModal"
     tabindex="-1"
     aria-labelledby="confirmationModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmationModalLabel">Confirm Publish</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="publishResults"></p>
        <p class="text-danger">Are you sure you want to publish to Wikidata?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-primary" id="confirmPublishBtn">
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>
<script type="application/json" id="languages-json">{{ languages|safe }}</script>
