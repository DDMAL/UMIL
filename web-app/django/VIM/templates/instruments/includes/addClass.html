{% load static %}

<!-- Add Class Modal Structure -->
<div class="modal fade"
     id="addClassModal"
     tabindex="-1"
     aria-labelledby="addClassModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-fullscreen-md-down">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addNameModalLabel">
          <span>Name: <span id="instrumentNameInModal" class="notranslate m-1"></span></span>
          <br />
          <small>Wikidata ID: <span id="instrumentWikidataIdInModal" class="notranslate m-1"></span></small>
        </h5>
        <div class="flex-grow-1"></div>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addClassForm" novalidate>
          {% csrf_token %}
          <input type="hidden" id="instrumentPkInClassModal" />
          <div class="mb-3 class-input">
            <label for="classInput" class="form-label">
              <span id="instrumentClassNameInModal"></span>
            </label>
            <input type="text"
                   class="form-control"
                   id="classInput"
                   name="class"
                   required
                   placeholder="Only include the numbers you are confident with" />
            <div class="valid-feedback"></div>
            <div class="invalid-feedback"></div>
          </div>
          <div id="ProposalsContainer" style="display: none;">
            {% if hbs_proposals %}
              <h6>Proposals:</h6>
              <div id="hbsProposalsList">
                {% for proposal in hbs_proposals %}
                  <button type="button"
                          class="btn btn-link btn-sm proposal-btn"
                          style="text-decoration: underline"
                          data-proposal="{{ proposal }}"
                          onclick="document.getElementById('classInput').value='{{ proposal }}'; document.getElementById('classInput').focus();">
                    {{ proposal }}
                  </button>
                  {% if not forloop.last %},{% endif %}
                {% endfor %}
              </div>
            {% endif %}
          </div>
          <div class="row mt-3">
            <div class="col text-end">
              <button type="submit" class="btn btn-primary modal-btn">Publish</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<!-- Confirmation Modal Structure -->
<div class="modal fade"
     id="confirmationClassModal"
     tabindex="-1"
     aria-labelledby="confirmationClassModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmationClassModalLabel">Confirm Publish</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="publishClassResults"></p>
        <p class="text-danger">
          Are you sure you want to publish this classification to Wikidata?
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-primary" id="confirmPublishClassBtn">
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>
