<!-- Delete Instrument Confirmation Modal -->
<div class="modal fade"
     id="deleteInstrumentModal"
     tabindex="-1"
     aria-labelledby="deleteInstrumentModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-md-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteInstrumentModalLabel">Delete Instrument</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Error display for deletion errors -->
                <div id="deleteModalError"
                     class="alert alert-danger"
                     role="alert"
                     style="display: none">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="deleteModalErrorMessage"></span>
                </div>
                <div class="mb-3">
                    <p>
                        This will permanently delete the instrument
                        <strong id="deleteInstrumentName"></strong>
                        and all its associated names and data. This action cannot be undone.
                    </p>
                </div>
                <div class="row mt-3">
                    <div class="col text-end">
                        <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                        <button type="button"
                                class="btn btn-danger modal-btn"
                                id="confirmDeleteInstrumentBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
