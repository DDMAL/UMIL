repos:
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --yes prettier --write
        language: system
        files: \.(js|jsx|ts|tsx|css|scss|less|json|yaml|yml|md)$
        require_serial: false

  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
        args: [--configuration=.djlintrc]
      - id: djlint-django
        args: [--configuration=.djlintrc]
